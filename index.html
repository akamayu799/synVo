<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My 音声合成エディタ</title>
    <style>
        /* 簡単なデザイン（CSS） */
        body { font-family: sans-serif; padding: 20px; background-color: #f5f6fa; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="range"] { width: 100%; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        audio { margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎙️ 音声合成エディタ</h2>
    
    <div class="control-group">
        <label>テキスト:</label>
        <input type="text" id="textInput" value="これはHTMLで作ったGUIのテストです。">
    </div>
    
    <div class="control-group">
        <label>声の高さ (Pitch): <span id="pitchValue">1.0</span></label>
        <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('pitchValue').innerText=this.value">
    </div>

    <button onclick="generateAudio()">音声を合成する</button>

    <audio id="audioPlayer" controls></audio>
</div>

<script>
    async function generateAudio() {
        // 1. 画面の入力値を取得
        const text = document.getElementById("textInput").value;
        const pitch = document.getElementById("pitchSlider").value;
        
        // 2. Pythonサーバーへデータを送信
        const response = await fetch("/synthesize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text, pitch: pitch })
        });

        // 3. 帰ってきた音声ファイル（Blob）をプレーヤーにセット
        if (response.ok) {
            const blob = await response.blob();
            const audioUrl = URL.createObjectURL(blob);
            document.getElementById("audioPlayer").src = audioUrl;
            document.getElementById("audioPlayer").play();
        } else {
            alert("音声の合成に失敗しました。");
        }
    }
</script>

</body>
</html>
